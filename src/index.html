<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>大分市 現住所確認ツール</title>

  <!-- MapLibre GL JS (CDN) -->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <header id="app-header">
      <h1 id="app-title">大分市 現住所確認ツール</h1>
      <div id="search-box">
        <label for="search-input" class="visually-hidden">旧住所・通称・新住所で検索</label>
        <input
          type="search"
          id="search-input"
          placeholder="例: 大字木上154、カームタウン、木上台1丁目"
          autocomplete="off"
          inputmode="search"
        />
      </div>
    </header>

    <main id="app-main">
      <section id="results-panel" aria-label="検索結果">
        <p id="results-summary" aria-live="polite"></p>
        <ul id="results-list"></ul>
      </section>

      <section id="map-panel" aria-label="該当地区の位置">
        <div id="map" aria-label="大分市 地区位置図"></div>
      </section>
    </main>

    <footer id="app-footer">
      <p>
        本ツールは大分市公開の住居表示旧新対照簿を基にした参考情報です。
        正式な確認は大分市市民協働推進課(097-537-7250)へお問い合わせください。
      </p>
      <p>
        データ出典:
        <a
          href="https://www.city.oita.oita.jp/o040/kurashi/sumaijoho/"
          target="_blank"
          rel="noopener"
          >大分市 住居表示旧新対照簿</a
        >
      </p>
    </footer>
  </div>

  <!-- エラーメッセージ表示領域(初期は非表示) -->
  <div id="error-banner" role="alert" hidden></div>

  <script src="js/normalize.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
